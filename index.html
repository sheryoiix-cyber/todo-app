<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHERY Todo List - Matrix Edition</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#050811">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="description" content="SHERY Todo List - Matrix Hacker Edition with Local Storage">
    <meta name="keywords" content="todo, list, app, matrix, hacker">
    <meta name="author" content="SHERY">
</head>
<body>
    <div class="matrix-bg">
        <canvas id="matrix-canvas"></canvas>
    </div>

    <div class="container">
        <!-- Header -->
        <header class="header">
            <div class="header-content">
                <h1 class="title">
                    <span class="glitch" data-text="SHERY">SHERY</span>
                    <span class="subtitle">Todo List v2.0</span>
                </h1>
                <div class="header-controls">
                    <button id="theme-toggle" class="btn-theme" title="Toggle Dark/Light Mode">
                        <span class="theme-icon">🌙</span>
                    </button>
                </div>
            </div>
        </header>

        <!-- Stats Dashboard -->
        <div class="stats-dashboard">
            <div class="stat-item">
                <span class="stat-label">Total</span>
                <span class="stat-value" id="total-tasks">0</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">Completed</span>
                <span class="stat-value" id="completed-tasks">0</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">Pending</span>
                <span class="stat-value" id="pending-tasks">0</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">Progress</span>
                <span class="stat-value" id="progress-percent">0%</span>
            </div>
        </div>

        <!-- Progress Bar -->
        <div class="progress-container">
            <div class="progress-bar" id="progress-bar"></div>
        </div>

        <!-- Input Section -->
        <div class="input-section">
            <div class="input-group">
                <input 
                    type="text" 
                    id="task-input" 
                    class="task-input" 
                    placeholder="Enter your task here..."
                    autofocus
                >
                <select id="priority-select" class="priority-select">
                    <option value="low">Low</option>
                    <option value="medium" selected>Medium</option>
                    <option value="high">High</option>
                </select>
                <select id="category-select" class="category-select">
                    <option value="general">General</option>
                    <option value="work">Work</option>
                    <option value="personal">Personal</option>
                    <option value="shopping">Shopping</option>
                    <option value="health">Health</option>
                </select>
                <button id="add-btn" class="btn btn-primary">➕ Add Task</button>
            </div>
        </div>

        <!-- Search & Filter Section -->
        <div class="filter-section">
            <input 
                type="text" 
                id="search-input" 
                class="search-input" 
                placeholder="🔍 Search tasks..."
            >
            <div class="filter-buttons">
                <button class="filter-btn active" data-filter="all">All</button>
                <button class="filter-btn" data-filter="active">Active</button>
                <button class="filter-btn" data-filter="completed">Completed</button>
                <button class="filter-btn" data-filter="high">High Priority</button>
            </div>
        </div>

        <!-- Tasks List -->
        <div class="tasks-container">
            <ul class="tasks-list" id="tasks-list"></ul>
            <div class="empty-state" id="empty-state">
                <div class="empty-icon">📋</div>
                <p>No tasks yet. Add one to get started!</p>
            </div>
        </div>

        <!-- Action Buttons -->
        <div class="action-buttons">
            <button id="export-btn" class="btn btn-secondary">📥 Export</button>
            <button id="import-btn" class="btn btn-secondary">📤 Import</button>
            <button id="clear-completed-btn" class="btn btn-danger">🗑️ Clear Completed</button>
            <button id="clear-all-btn" class="btn btn-danger">⚠️ Clear All</button>
        </div>

        <!-- Hidden import input -->
        <input type="file" id="import-file" accept=".json" style="display: none;">
    </div>

    <!-- Footer -->
    <footer class="footer">
        <p>🔒 All data stored locally • No cloud sync • 100% Private</p>
    </footer>

    <script src="script.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('service-worker.js').catch(err => console.log('SW error:', err));
        }
    </script>
</body>
</html>
